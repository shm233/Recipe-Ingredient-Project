{% extends 'master/base.html' %}

{% block body %}
  <title>Recipe | Update</title>
  <h1>Recipe Update Form</h1>
  <form method="post" enctype="multipart/form-data">
    {% csrf_token %}
    <div class="mb-3">
      <label for="exampleInputEmail1" class="form-label">Recipe Name</label>
      <input type="text" name="name" value="{{ recipe.name }}" class="form-control" id="exampleInputEmail1" required />
    </div>
    <div class="mb-3">
      <label for="exampleInputPassword1" class="form-label">Description</label>
      <textarea name="description" class="form-control" id="">{{ recipe.description }}</textarea>
    </div>
    <div class="mb-3">
      <label for="exampleInputPassword1" class="form-label">Category</label>
      <input type="text" name="category" value="{{ recipe.category }}" class="form-control" id="exampleInputPassword1" required />
    </div>
    <div class="mb-3">
      <label for="exampleInputPassword1" class="form-label">Recipe Image</label>
      <img src="/{{ recipe.recipe_image }}" alt="" width="100px" height="100px" />
      <input type="file" name="recipe_image" value="{{ recipe.recipe_image }}" class="form-control" id="exampleInputPassword1" />
    </div>
    <button type="submit" class="btn btn-primary">Submit</button>
  </form>
{% endblock %}
